name: Release unezQuake

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Build Linux
  # ─────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives
            /var/lib/apt/lists
          key: apt-${{ runner.os }}-v1
          restore-keys: apt-${{ runner.os }}-

      - name: Instalar dependências
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ccache \
            libsdl2-dev libjansson-dev libcurl4-openssl-dev \
            libpcre3-dev libexpat1-dev libpng-dev libjpeg-dev \
            libspeex-dev libspeexdsp-dev libfreetype6-dev \
            zlib1g-dev libminizip-dev libsndfile1-dev

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-linux-${{ github.sha }}
          restore-keys: ccache-linux-

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build
          key: cmake-linux-${{ hashFiles('CMakeLists.txt', 'cmake/**') }}
          restore-keys: cmake-linux-

      - name: Configurar ccache
        run: ccache --max-size=500M

      - name: Compilar
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          make -j$(nproc)

      - name: Renomear binário com a tag
        run: |
          TAG=${{ github.ref_name }}
          cp build/unezquake-linux-x86_64 unezquake-${TAG}-linux

      - name: Upload artefato Linux
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: unezquake-*-linux

  # ─────────────────────────────────────────────
  # Job 2: Build Windows (MinGW cross-compile)
  # ─────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache apt (MinGW)
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives
            /var/lib/apt/lists
          key: apt-mingw-${{ runner.os }}-v1
          restore-keys: apt-mingw-${{ runner.os }}-

      - name: Instalar MinGW
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake mingw-w64 ccache

      - name: Cache ccache (Windows cross)
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-mingw-${{ github.sha }}
          restore-keys: ccache-mingw-

      - name: Cache CMake build Windows
        uses: actions/cache@v4
        with:
          path: build-win
          key: cmake-win-${{ hashFiles('CMakeLists.txt', 'cmake/**') }}
          restore-keys: cmake-win-

      - name: Compilar para Windows
        run: |
          ccache --max-size=500M
          mkdir -p build-win && cd build-win
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=../cmake/toolchain-mingw64.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache || true
          make -j$(nproc) || true

      - name: Renomear binário com a tag
        run: |
          TAG=${{ github.ref_name }}
          [ -f build-win/unezquake.exe ] && \
            cp build-win/unezquake.exe unezquake-${TAG}-windows.exe || \
            echo "Binário Windows não gerado, pulando..."

      - name: Upload artefato Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: unezquake-*-windows.exe
          if-no-files-found: warn

  # ─────────────────────────────────────────────
  # Job 3: Publica o Release no GitHub
  # ─────────────────────────────────────────────
  release:
    name: Publicar Release
    runs-on: ubuntu-latest
    needs: [ build-linux, build-windows ]
    permissions:
      contents: write
    steps:
      - name: Baixar todos os artefatos
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true   # coloca tudo numa pasta só

      - name: Listar arquivos a publicar
        run: find artifacts -type f | sort

      - name: Criar Release e publicar binários
        uses: softprops/action-gh-release@v2
        with:
          name: "unezQuake ${{ github.ref_name }}"
          body: |
            ## unezQuake ${{ github.ref_name }}

            ### Downloads
            | Plataforma | Arquivo |
            |------------|---------|
            | 🐧 Linux   | `unezquake-${{ github.ref_name }}-linux` |
            | 🪟 Windows | `unezquake-${{ github.ref_name }}-windows.exe` |

            ### Como usar (Linux)
            ```bash
            chmod +x unezquake-${{ github.ref_name }}-linux
            ./unezquake-${{ github.ref_name }}-linux
            ```
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          fail_on_unmatched_files: false
