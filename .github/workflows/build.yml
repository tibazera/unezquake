name: Build unezQuake

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Build no Linux (Ubuntu)
  # ─────────────────────────────────────────────
  build-linux:
    name: Linux (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar dependências
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libsdl2-dev \
            libjansson-dev \
            libcurl4-openssl-dev \
            libpcre3-dev \
            libexpat1-dev \
            libpng-dev \
            libjpeg-dev \
            libspeex-dev \
            libspeexdsp-dev \
            libfreetype6-dev \
            zlib1g-dev

      - name: Compilar
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Guardar binário como artefato
        uses: actions/upload-artifact@v4
        with:
          name: unezquake-linux
          path: build/ezquake-gl.glx
          if-no-files-found: warn

  # ─────────────────────────────────────────────
  # Job 2: Build no Windows (cross-compile)
  # ─────────────────────────────────────────────
  build-windows:
    name: Windows (MinGW cross-compile)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar MinGW e dependências Windows
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            mingw-w64

      - name: Compilar para Windows (x86_64)
        run: |
          mkdir -p build-win
          cd build-win
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=../cmake/toolchain-mingw64.cmake \
            -DCMAKE_BUILD_TYPE=Release || true
          make -j$(nproc) || true

      - name: Guardar binário Windows como artefato
        uses: actions/upload-artifact@v4
        with:
          name: unezquake-windows
          path: build-win/*.exe
          if-no-files-found: warn

  # ─────────────────────────────────────────────
  # Job 3: Notifica resultado no PR
  # ─────────────────────────────────────────────
  notify:
    name: Resumo do Build
    runs-on: ubuntu-latest
    needs: [ build-linux, build-windows ]
    if: always()

    steps:
      - name: Status final
        run: |
          echo "Linux build: ${{ needs.build-linux.result }}"
          echo "Windows build: ${{ needs.build-windows.result }}"
