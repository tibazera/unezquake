name: Build unezQuake

on:
  push:
    branches: [ master ]
    paths:
      - '**.c'
      - '**.h'
      - '**.cpp'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ master ]
    paths:
      - '**.c'
      - '**.h'
      - '**.cpp'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - '.github/workflows/build.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    name: Linux (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      # Cache apt: chave baseada no workflow (sem sha)
      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives
            /var/lib/apt/lists
          key: apt-${{ runner.os }}-v1
          restore-keys: apt-${{ runner.os }}-

      - name: Instalar dependências
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ccache \
            libsdl2-dev libjansson-dev libcurl4-openssl-dev \
            libpcre3-dev libexpat1-dev libpng-dev libjpeg-dev \
            libspeex-dev libspeexdsp-dev libfreetype6-dev \
            zlib1g-dev libminizip-dev libsndfile1-dev

      # Cache ccache: salva objetos compilados entre builds
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-linux-${{ github.sha }}
          restore-keys: ccache-linux-

      # Cache CMake: sem sha na chave principal para reutilizar entre commits
      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build
          key: cmake-linux-${{ hashFiles('CMakeLists.txt', 'cmake/**') }}
          restore-keys: cmake-linux-

      - name: Configurar ccache
        run: |
          ccache --max-size=500M
          ccache --zero-stats

      - name: Compilar
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          make -j$(nproc)

      - name: Stats ccache
        run: ccache --show-stats

      - name: Guardar binário como artefato
        uses: actions/upload-artifact@v4
        with:
          name: unezquake-linux
          path: build/unezquake-linux-x86_64
          if-no-files-found: warn

  build-windows:
    name: Windows (MinGW cross-compile)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Cache apt (Windows job)
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives
            /var/lib/apt/lists
          key: apt-mingw-${{ runner.os }}-v1
          restore-keys: apt-mingw-${{ runner.os }}-

      - name: Instalar MinGW
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake mingw-w64 ccache

      - name: Cache ccache (Windows cross)
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-mingw-${{ github.sha }}
          restore-keys: ccache-mingw-

      - name: Cache CMake build Windows
        uses: actions/cache@v4
        with:
          path: build-win
          key: cmake-win-${{ hashFiles('CMakeLists.txt', 'cmake/**') }}
          restore-keys: cmake-win-

      - name: Compilar para Windows (x86_64)
        run: |
          ccache --max-size=500M
          mkdir -p build-win && cd build-win
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=../cmake/toolchain-mingw64.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache || true
          make -j$(nproc) || true

      - name: Guardar binário Windows como artefato
        uses: actions/upload-artifact@v4
        with:
          name: unezquake-windows
          path: build-win/*.exe
          if-no-files-found: warn

  notify:
    name: Resumo do Build
    runs-on: ubuntu-latest
    needs: [ build-linux, build-windows ]
    if: always()
    steps:
      - name: Status final
        run: |
          echo "Linux build:   ${{ needs.build-linux.result }}"
          echo "Windows build: ${{ needs.build-windows.result }}"
